{% extends "base.html" %}
{% block title %}Sign In — MindEase{% endblock %}
{% block extra_head %}
<style>
    .auth-wrap {
        min-height: calc(100vh - 64px);
        display: flex; align-items: center; justify-content: center;
        padding: 2rem;
        background:
            radial-gradient(ellipse 70% 60% at 30% 50%, rgba(56,189,248,0.07) 0%, transparent 65%),
            radial-gradient(ellipse 60% 50% at 70% 50%, rgba(129,140,248,0.07) 0%, transparent 65%);
    }
    .auth-card {
        width: 100%; max-width: 420px;
        background: var(--surface); border: 1px solid var(--border);
        border-radius: 20px; padding: 2.5rem;
        box-shadow: 0 24px 64px rgba(0,0,0,0.35);
        animation: fadeUp 0.5s ease both;
    }
    .auth-logo {
        font-family: var(--font-head); font-size: 1.6rem; font-weight: 800;
        background: linear-gradient(135deg, var(--accent), var(--accent2));
        -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        margin-bottom: 0.4rem;
    }
    .auth-subtitle { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 2rem; }
    .field { margin-bottom: 1.2rem; }
    .field label {
        display: block; font-size: 0.85rem; font-weight: 600;
        color: var(--text-muted); margin-bottom: 0.45rem; letter-spacing: 0.2px;
    }
    .field input {
        width: 100%; background: var(--bg); border: 1px solid var(--border);
        border-radius: 10px; padding: 0.75rem 1rem;
        color: var(--text); font-family: var(--font-body); font-size: 0.95rem;
        transition: border-color 0.2s, box-shadow 0.2s; outline: none;
    }
    .field input:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(56,189,248,0.15);
    }
    .field input::placeholder { color: var(--text-muted); }
    .btn-submit {
        width: 100%; padding: 0.85rem;
        background: linear-gradient(135deg, var(--accent), var(--accent2));
        border: none; border-radius: 10px; color: #fff;
        font-family: var(--font-body); font-size: 1rem; font-weight: 600;
        cursor: pointer; margin-top: 0.5rem; transition: opacity 0.2s, transform 0.2s;
        box-shadow: 0 4px 16px rgba(56,189,248,0.25);
    }
    .btn-submit:hover { opacity: 0.88; transform: translateY(-1px); }
    .auth-footer { text-align: center; margin-top: 1.5rem; font-size: 0.88rem; color: var(--text-muted); }
    .auth-footer a { color: var(--accent); text-decoration: none; font-weight: 500; }
    .divider {
        border: none; border-top: 1px solid var(--border); margin: 1.5rem 0;
    }
    @keyframes fadeUp { from{opacity:0;transform:translateY(20px);} to{opacity:1;transform:translateY(0);} }
</style>
{% endblock %}

{% block content %}
<div class="auth-wrap">
    <div class="auth-card">
        <div class="auth-logo">MindEase</div>
        <p class="auth-subtitle">Welcome back. Sign in to continue.</p>
        <hr class="divider">
        <form method="post" action="">
            {% csrf_token %}
            <div class="field">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Enter your username" required autocomplete="username">
            </div>
            <div class="field">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your password" required autocomplete="current-password">
            </div>
            <button type="submit" class="btn-submit">Sign In →</button>
        </form>
        <p class="auth-footer">Don't have an account? <a href="/register/">Create one</a></p>
    </div>
</div>
{% endblock %}

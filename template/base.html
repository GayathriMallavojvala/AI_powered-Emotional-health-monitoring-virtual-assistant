<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}MindEase — AI Mental Health Support{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:         #0b0f1a;
            --bg2:        #111827;
            --surface:    #1a2235;
            --surface2:   #1e2d45;
            --border:     rgba(99,179,237,0.12);
            --accent:     #38bdf8;
            --accent2:    #818cf8;
            --accent3:    #34d399;
            --text:       #e2e8f0;
            --text-muted: #64748b;
            --danger:     #f87171;
            --success:    #34d399;
            --user-msg:   #1d4ed8;
            --bot-msg:    #1e2d45;
            --radius:     14px;
            --shadow:     0 8px 32px rgba(0,0,0,0.4);
            --font-head:  'Syne', sans-serif;
            --font-body:  'DM Sans', sans-serif;
        }

        html { scroll-behavior: smooth; }

        body {
            font-family: var(--font-body);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ── Navbar ── */
        .navbar {
            position: fixed; top: 0; left: 0; right: 0; z-index: 100;
            background: rgba(11,15,26,0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 2rem; height: 64px;
        }
        .nav-brand {
            font-family: var(--font-head);
            font-size: 1.4rem; font-weight: 800;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-decoration: none; letter-spacing: -0.5px;
        }
        .nav-brand span { -webkit-text-fill-color: var(--accent3); }
        .nav-links { display: flex; align-items: center; gap: 0.5rem; }
        .nav-links a {
            color: var(--text-muted); text-decoration: none;
            padding: 0.45rem 1rem; border-radius: 8px;
            font-size: 0.9rem; font-weight: 500;
            transition: all 0.2s;
        }
        .nav-links a:hover { color: var(--text); background: var(--surface); }
        .nav-links a.active { color: var(--accent); }
        .btn-nav {
            background: linear-gradient(135deg, var(--accent), var(--accent2)) !important;
            color: #fff !important; -webkit-text-fill-color: #fff !important;
            padding: 0.45rem 1.2rem !important; font-weight: 600 !important;
        }
        .btn-nav:hover { opacity: 0.88; background: linear-gradient(135deg, var(--accent), var(--accent2)) !important; }

        /* ── Page wrapper ── */
        .page-wrap {
            min-height: 100vh;
            padding-top: 64px;
        }

        /* ── Toast messages ── */
        .toast-container {
            position: fixed; top: 80px; right: 1.5rem; z-index: 999;
            display: flex; flex-direction: column; gap: 0.5rem;
        }
        .toast {
            padding: 0.75rem 1.25rem; border-radius: 10px;
            font-size: 0.9rem; font-weight: 500;
            animation: slideIn 0.3s ease;
            max-width: 340px;
        }
        .toast-error   { background: rgba(248,113,113,0.15); border: 1px solid var(--danger);  color: var(--danger); }
        .toast-success { background: rgba(52,211,153,0.15);  border: 1px solid var(--success); color: var(--success); }
        .toast-info    { background: rgba(56,189,248,0.15);  border: 1px solid var(--accent);  color: var(--accent); }
        @keyframes slideIn { from { opacity:0; transform: translateX(30px); } to { opacity:1; transform: translateX(0); } }

        /* ── Utility ── */
        .gradient-text {
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
<nav class="navbar">
    <a href="/" class="nav-brand">Mind<span>Ease</span></a>
    <div class="nav-links">
        <a href="/">Home</a>
        {% if user.is_authenticated %}
            <a href="/chatbot/" class="btn-nav">💬 Chat</a>
            <a href="/logout/">Logout</a>
        {% else %}
            <a href="/register/">Sign Up</a>
            <a href="/login/" class="btn-nav">Login</a>
        {% endif %}
    </div>
</nav>

{% if messages %}
<div class="toast-container">
{% for message in messages %}
    <div class="toast toast-{% if message.tags == 'error' %}error{% elif message.tags == 'success' %}success{% else %}info{% endif %}">
        {{ message }}
    </div>
{% endfor %}
</div>
<script>
    setTimeout(() => {
        document.querySelectorAll('.toast').forEach(t => {
            t.style.transition = 'opacity 0.4s';
            t.style.opacity = '0';
            setTimeout(() => t.remove(), 400);
        });
    }, 4000);
</script>
{% endif %}

<div class="page-wrap">
    {% block content %}{% endblock %}
</div>
</body>
</html>

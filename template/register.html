{% extends "base.html" %}
{% block title %}Create Account — MindEase{% endblock %}
{% block extra_head %}
<style>
    .auth-wrap {
        min-height: calc(100vh - 64px);
        display: flex; align-items: center; justify-content: center;
        padding: 2rem;
        background:
            radial-gradient(ellipse 70% 60% at 30% 50%, rgba(52,211,153,0.07) 0%, transparent 65%),
            radial-gradient(ellipse 60% 50% at 70% 50%, rgba(129,140,248,0.07) 0%, transparent 65%);
    }
    .auth-card {
        width: 100%; max-width: 480px;
        background: var(--surface); border: 1px solid var(--border);
        border-radius: 20px; padding: 2.5rem;
        box-shadow: 0 24px 64px rgba(0,0,0,0.35);
        animation: fadeUp 0.5s ease both;
    }
    .auth-logo {
        font-family: var(--font-head); font-size: 1.6rem; font-weight: 800;
        background: linear-gradient(135deg, var(--accent3), var(--accent));
        -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        margin-bottom: 0.4rem;
    }
    .auth-subtitle { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 2rem; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .field { margin-bottom: 1rem; }
    .field.full { grid-column: 1 / -1; }
    .field label {
        display: block; font-size: 0.85rem; font-weight: 600;
        color: var(--text-muted); margin-bottom: 0.4rem;
    }
    .field input {
        width: 100%; background: var(--bg); border: 1px solid var(--border);
        border-radius: 10px; padding: 0.72rem 1rem;
        color: var(--text); font-family: var(--font-body); font-size: 0.92rem;
        transition: border-color 0.2s, box-shadow 0.2s; outline: none;
    }
    .field input:focus {
        border-color: var(--accent3);
        box-shadow: 0 0 0 3px rgba(52,211,153,0.15);
    }
    .field input::placeholder { color: var(--text-muted); }
    .field-hint { font-size: 0.78rem; color: var(--text-muted); margin-top: 0.3rem; }
    .btn-submit {
        width: 100%; padding: 0.85rem;
        background: linear-gradient(135deg, var(--accent3), var(--accent));
        border: none; border-radius: 10px; color: #0b0f1a;
        font-family: var(--font-body); font-size: 1rem; font-weight: 700;
        cursor: pointer; margin-top: 0.75rem; transition: opacity 0.2s, transform 0.2s;
        box-shadow: 0 4px 16px rgba(52,211,153,0.25);
    }
    .btn-submit:hover { opacity: 0.88; transform: translateY(-1px); }
    .divider { border: none; border-top: 1px solid var(--border); margin: 1.5rem 0; }
    .auth-footer { text-align: center; margin-top: 1.5rem; font-size: 0.88rem; color: var(--text-muted); }
    .auth-footer a { color: var(--accent); text-decoration: none; font-weight: 500; }
    .strength-bar { height: 4px; border-radius: 2px; margin-top: 6px; background: var(--border); overflow: hidden; }
    .strength-fill { height: 100%; border-radius: 2px; width: 0; transition: width 0.3s, background 0.3s; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(20px);} to{opacity:1;transform:translateY(0);} }
</style>
{% endblock %}

{% block content %}
<div class="auth-wrap">
    <div class="auth-card">
        <div class="auth-logo">Join MindEase</div>
        <p class="auth-subtitle">Create your account to access the AI chatbot.</p>
        <hr class="divider">
        <form method="post" action="">
            {% csrf_token %}
            <div class="form-grid">
                <div class="field">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" placeholder="Your name" required>
                </div>
                <div class="field">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="you@email.com" required>
                </div>
                <div class="field full">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Choose a username" required autocomplete="username">
                </div>
                <div class="field">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Min. 8 characters" required autocomplete="new-password">
                    <div class="strength-bar"><div class="strength-fill" id="str-fill"></div></div>
                </div>
                <div class="field">
                    <label for="cnfm_password">Confirm Password</label>
                    <input type="password" id="cnfm_password" name="cnfm_password" placeholder="Repeat password" required autocomplete="new-password">
                </div>
            </div>
            <button type="submit" class="btn-submit">Create Account →</button>
        </form>
        <p class="auth-footer">Already have an account? <a href="/login/">Sign in</a></p>
    </div>
</div>
<script>
const pw = document.getElementById('password');
const fill = document.getElementById('str-fill');
pw.addEventListener('input', () => {
    const v = pw.value; let score = 0;
    if(v.length >= 8) score++;
    if(/[A-Z]/.test(v)) score++;
    if(/[0-9]/.test(v)) score++;
    if(/[^A-Za-z0-9]/.test(v)) score++;
    const colors = ['#f87171','#fb923c','#facc15','#34d399'];
    fill.style.width = (score * 25) + '%';
    fill.style.background = colors[score-1] || '#334155';
});
</script>
{% endblock %}
